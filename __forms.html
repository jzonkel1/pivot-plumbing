<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Netlify form definitions — Pivot Plumbing</title>
<meta name="robots" content="noindex"></head>
<body>
  <!-- These hidden forms exist only so Netlify's build-time crawler detects every form,
       including the request popup that is injected by main.js. Do not remove. -->
  <form name="quote-request" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="quote-request">
    <input name="bot-field">
    <input type="text" name="name">
    <input type="tel" name="phone">
    <input type="email" name="email">
    <input type="text" name="service">
    <input type="text" name="property">
    <input type="text" name="urgency">
    <input type="text" name="city">
    <textarea name="message"></textarea>
  </form>
  <form name="popup-quote" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="popup-quote">
    <input name="bot-field">
    <input type="text" name="name">
    <input type="tel" name="phone">
    <input type="text" name="issue">
  </form>
  <form name="private-feedback" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="private-feedback">
    <input name="bot-field">
    <input type="text" name="name">
    <input type="text" name="source">
    <textarea name="message"></textarea>
  </form>
</body>
</html>
